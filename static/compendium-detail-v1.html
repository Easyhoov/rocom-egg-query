<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精灵详情 - 洛克王国：世界</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#000;--white:#fff;--green:#0acf83;--red:#f24e1e;--purple:#a259ff;--pink:#ff7262;
  --primary:#000;--secondary:#3d3d3d;--tertiary:#595959;--muted:#707070;
  --bg:#fafafa;--card-bg:#fff;--border:#e5e5e5;
  --pill:50px;--radius:8px;
  --shadow:0 2px 24px rgba(0,0,0,.06);--shadow-hover:0 8px 40px rgba(0,0,0,.12);
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Inter','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--primary);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 24px}
.nav-inner{max-width:1280px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:24px}
.logo{font-weight:700;font-size:18px;white-space:nowrap;display:flex;align-items:center;gap:8px}
.logo span{color:var(--green)}
.nav-links{display:flex;gap:4px;list-style:none}
.nav-links a{padding:8px 14px;border-radius:var(--pill);font-size:14px;font-weight:500;color:var(--tertiary);transition:all .15s;white-space:nowrap}
.nav-links a:hover{background:#f0f0f0;color:var(--primary)}
.nav-links a.active{background:var(--green);color:var(--white)}
.nav-cta{display:none}
@media(min-width:960px){.nav-cta{display:inline-flex;padding:8px 20px;border-radius:var(--pill);background:var(--primary);color:var(--white);font-size:14px;font-weight:600;align-items:center;gap:6px;border:none;cursor:pointer;transition:opacity .15s}.nav-cta:hover{opacity:.85}}
.hamburger{display:flex;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px}
.hamburger span{display:block;width:20px;height:2px;background:var(--primary);border-radius:2px;transition:all .2s}
@media(min-width:960px){.hamburger{display:none}}
.drawer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;pointer-events:none}
.drawer.open{pointer-events:all}
.drawer-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);opacity:0;transition:opacity .25s}
.drawer.open .drawer-overlay{opacity:1}
.drawer-panel{position:absolute;top:0;right:0;width:280px;height:100%;background:var(--white);transform:translateX(100%);transition:transform .25s;padding:24px;display:flex;flex-direction:column;gap:8px}
.drawer.open .drawer-panel{transform:translateX(0)}
.drawer-close{align-self:flex-end;background:none;border:none;cursor:pointer;font-size:24px;line-height:1;padding:8px}
.drawer-panel a{display:block;padding:12px 16px;border-radius:var(--radius);font-size:15px;font-weight:500;color:var(--tertiary);transition:background .15s}
.drawer-panel a:hover{background:#f0f0f0}
.drawer-panel a.active{background:var(--green);color:var(--white)}

/* MAIN */
.main{max-width:1280px;margin:0 auto;padding:24px 24px 64px}

/* BACK */
.back-link{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:14px;margin-bottom:24px;transition:color .15s}
.back-link:hover{color:var(--primary)}

/* DETAIL */
.detail{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:768px){.detail{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:16px;font-weight:700}
.card-body{padding:20px}

/* HERO */
.hero{text-align:center;padding:32px 20px}
.hero-img{width:120px;height:120px;margin:0 auto 16px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-img img{width:100%;height:100%;object-fit:contain}
.hero-no{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--muted);margin-bottom:4px}
.hero-name{font-size:24px;font-weight:700;margin-bottom:8px}
.hero-badges{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.badge{display:inline-flex;padding:4px 12px;border-radius:var(--pill);font-size:12px;font-weight:600;color:var(--white)}
.badge-attr{background:var(--green)}
.badge-egg{background:#e8e8e8;color:var(--tertiary);font-weight:500}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-item{text-align:center;padding:12px;background:#f7f7f7;border-radius:var(--radius)}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:4px}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700}

/* RADAR */
.radar-container{width:100%;aspect-ratio:1;max-width:300px;margin:0 auto}
.radar-container svg{width:100%;height:100%}

/* SKILLS */
.skills-list{display:flex;flex-direction:column;gap:8px}
.skill-item{display:flex;align-items:center;gap:12px;padding:12px;background:#f7f7f7;border-radius:var(--radius)}
.skill-icon{width:36px;height:36px;border-radius:8px;background:#e0e0e0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.skill-icon img{width:100%;height:100%;object-fit:contain}
.skill-info{flex:1}
.skill-name{font-size:14px;font-weight:600}
.skill-meta{font-size:12px;color:var(--muted);margin-top:2px}
.skill-effect{font-size:12px;color:var(--tertiary);margin-top:4px}

/* TYPE MATCHUPS */
.matchups-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.matchup-group{padding:12px;background:#f7f7f7;border-radius:var(--radius)}
.matchup-label{font-size:12px;color:var(--muted);margin-bottom:8px}
.matchup-tags{display:flex;flex-wrap:wrap;gap:4px}
.matchup-tag{padding:2px 8px;border-radius:var(--pill);font-size:11px;font-weight:500}

/* LOADING */
.loading{text-align:center;padding:80px 24px;color:var(--muted)}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:80px 24px;color:var(--muted);font-size:15px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}

/* FOOTER */
.footer{border-top:1px solid var(--border);padding:32px 24px;text-align:center;color:var(--muted);font-size:13px}
.footer a{color:var(--green);font-weight:500}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo">洛克<span>工具箱</span></a>
    <ul class="nav-links">
      <li><a href="/egg-query">孵蛋查询</a></li>
      <li><a href="/compendium" class="active">精灵图鉴</a></li>
      <li><a href="/egg-group">蛋组配对</a></li>
      <li><a href="/garden">家园炼金</a></li>
      <li><a href="/merchant">远行商人</a></li>
    </ul>
    <button class="nav-cta">GitHub</button>
    <button class="hamburger" onclick="toggleDrawer()" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- MOBILE DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-overlay" onclick="toggleDrawer()"></div>
  <div class="drawer-panel">
    <button class="drawer-close" onclick="toggleDrawer()">✕</button>
    <a href="/egg-query">孵蛋查询</a>
    <a href="/compendium" class="active">精灵图鉴</a>
    <a href="/egg-group">蛋组配对</a>
    <a href="/garden">家园炼金</a>
    <a href="/merchant">远行商人</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <a href="/compendium" class="back-link">← 返回图鉴</a>
  
  <div id="content">
    <div class="loading"><div class="spinner"></div><p style="margin-top:12px">加载中…</p></div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <p>洛克王国：世界 工具箱 · 数据仅供参考 · <a href="https://github.com" target="_blank">GitHub</a></p>
</footer>

<script>
(function(){
  // 属性图标映射
  const ATTR_ICONS = {
    '普通': '/attr-icons/普通.png', '草': '/attr-icons/草.png', '火': '/attr-icons/火.png',
    '水': '/attr-icons/水.png', '光': '/attr-icons/光.png', '地': '/attr-icons/地.png',
    '冰': '/attr-icons/冰.png', '龙': '/attr-icons/龙.png', '电': '/attr-icons/电.png',
    '毒': '/attr-icons/毒.png', '虫': '/attr-icons/虫.png', '武': '/attr-icons/武.png',
    '翼': '/attr-icons/翼.png', '萌': '/attr-icons/萌.png', '幽': '/attr-icons/幽.png',
    '恶': '/attr-icons/恶.png', '机械': '/attr-icons/机械.png', '幻': '/attr-icons/幻.png',
  };

  // 属性名称映射
  const ATTR_NAME_MAP = {
    '光系': '光', '火系': '火', '水系': '水', '草系': '草', '冰系': '冰',
    '地系': '地', '龙系': '龙', '电系': '电', '毒系': '毒', '虫系': '虫',
    '武系': '武', '翼系': '翼', '萌系': '萌', '幽系': '幽', '恶系': '恶',
    '机械系': '机械', '幻系': '幻', '普通系': '普通',
  };

  // 技能类型颜色
  const SKILL_TYPE_STYLES = {
    '物理': { bg: '#fee8e8', color: '#e74c3c', label: '物' },
    '魔法': { bg: '#e8e8ff', color: '#667eea', label: '魔' },
    '防御': { bg: '#e8f5e9', color: '#4caf50', label: '防' },
    '状态': { bg: '#fff3e0', color: '#ff9800', label: '变' },
  };

  // 六维雷达图配置
  const statOrder = ['hp', 'attack', 'defense', 'magic_defense', 'magic_attack', 'speed'];
  const statLabels = {
    hp: { label: '生命', color: '#4caf50' },
    attack: { label: '物攻', color: '#e74c3c' },
    defense: { label: '物防', color: '#3498db' },
    magic_defense: { label: '魔防', color: '#f39c12' },
    magic_attack: { label: '魔攻', color: '#9b59b6' },
    speed: { label: '速度', color: '#1abc9c' },
  };

  const RADAR_CX = 150, RADAR_CY = 150, RADAR_R = 110;
  const MAX_STAT = 150;
  const GRID_LEVELS = 5;

  function axisAngle(i) {
    return (-90 + i * 60) * Math.PI / 180;
  }
  function polarToXY(i, r) {
    const a = axisAngle(i);
    return { x: RADAR_CX + r * Math.cos(a), y: RADAR_CY + r * Math.sin(a) };
  }
  function gridPoints(level) {
    const r = RADAR_R * level / GRID_LEVELS;
    return Array.from({ length: 6 }, (_, i) => {
      const p = polarToXY(i, r);
      return `${p.x},${p.y}`;
    }).join(' ');
  }
  function axisEnd(i) {
    return polarToXY(i, RADAR_R);
  }

  function getAttrIcon(attr) {
    return ATTR_ICONS[attr] || null;
  }

  function formatAttr(attr) {
    return ATTR_NAME_MAP[attr] || attr?.replace('系', '') || attr || '';
  }

  // 获取精灵 ID
  const pathParts = window.location.pathname.split('/');
  const spiritId = pathParts[pathParts.length - 1];

  async function fetchDetail() {
    const content = document.getElementById('content');
    try {
      const [detailResp, skillsResp, matchupsResp] = await Promise.all([
        fetch(`/api/spirits/${spiritId}`),
        fetch(`/api/spirits/${spiritId}/skills`),
        fetch(`/api/spirits/${spiritId}/type-matchups`)
      ]);

      const detailData = await detailResp.json();
      const skillsData = await skillsResp.json();
      const matchupsData = await matchupsResp.json();

      if (!detailData.success) throw new Error('获取精灵详情失败');

      const spirit = detailData.spirit;
      const skills = skillsData.success ? skillsData.skills : [];
      const matchups = matchupsData.success ? matchupsData : null;

      renderDetail(spirit, skills, matchups);
    } catch (e) {
      content.innerHTML = `<div class="empty"><div class="empty-icon">❌</div><p>${e.message}</p></div>`;
    }
  }

  function renderDetail(spirit, skills, matchups) {
    const content = document.getElementById('content');
    
    // 基础信息
    const imgSrc = spirit.image || '';
    const shinyImg = spirit.shiny_image || '';
    const attrs = [];
    if (spirit.primary_attribute) attrs.push(spirit.primary_attribute);
    if (spirit.secondary_attribute) attrs.push(spirit.secondary_attribute);
    
    const attrBadges = attrs.map(a => {
      const icon = getAttrIcon(a);
      const iconHtml = icon ? `<img src="${icon}" style="width:14px;height:14px;vertical-align:middle;margin-right:4px" />` : '';
      return `<span class="badge badge-attr">${iconHtml}${a}</span>`;
    }).join('');
    
    const eggBadges = (spirit.egg_groups || []).map(g => `<span class="badge badge-egg">${g}</span>`).join('');
    
    // 六维属性
    const stats = statOrder.map(key => ({
      key, ...statLabels[key], value: spirit[key] || 0
    }));
    
    // 雷达图
    const radarPoints = statOrder.map((key, i) => {
      const val = spirit[key] || 0;
      const r = RADAR_R * Math.min(val / MAX_STAT, 1);
      const p = polarToXY(i, r);
      return `${p.x},${p.y}`;
    }).join(' ');

    // 技能去重 + 排序
    const seen = new Set();
    const sortedSkills = skills.filter(s => {
      if (seen.has(s.name)) return false;
      seen.add(s.name);
      return true;
    }).sort((a, b) => a.cost - b.cost || a.name.localeCompare(b.name));

    // 技能按类型分组
    const groupedSkills = {};
    sortedSkills.forEach(s => {
      const t = SKILL_TYPE_STYLES[s.type] ? s.type : '状态';
      if (!groupedSkills[t]) groupedSkills[t] = [];
      groupedSkills[t].push(s);
    });

    // 属性克制
    let matchupsHtml = '';
    if (matchups) {
      const matchupGroups = [
        { label: '克制', data: matchups.strong_against, bg: '#e8f5e9', color: '#2e7d32' },
        { label: '被克制', data: matchups.weak_to, bg: '#fee8e8', color: '#c62828' },
        { label: '抵抗', data: matchups.resists, bg: '#e3f2fd', color: '#1565c0' },
        { label: '被抵抗', data: matchups.resisted_by, bg: '#fff3e0', color: '#e65100' },
      ];

      matchupsHtml = matchupGroups.map(g => {
        if (!g.data || g.data.length === 0) return '';
        const tags = g.data.map(t => `<span class="matchup-tag" style="background:${g.bg};color:${g.color}">${formatAttr(t)}</span>`).join('');
        return `<div class="matchup-group"><div class="matchup-label">${g.label}</div><div class="matchup-tags">${tags}</div></div>`;
      }).join('');
    }

    content.innerHTML = `
      <!-- 基础信息 -->
      <div class="detail">
        <div class="card">
          <div class="card-header">
            <div class="card-title">基础信息</div>
            ${spirit.has_shiny_variant ? '<button onclick="toggleShiny()" style="padding:4px 12px;border-radius:50px;border:1px solid #e5e5e5;background:#fff;font-size:12px;cursor:pointer">✨ 异色</button>' : ''}
          </div>
          <div class="card-body">
            <div class="hero">
              <div class="hero-img">
                <img id="heroImg" src="${imgSrc}" alt="${spirit.base_name}" onerror="this.parentElement.innerHTML='<div style="font-size:48px">🖼️</div>'" />
              </div>
              <div class="hero-no">${spirit.spirit_no}</div>
              <div class="hero-name">${spirit.display_name || spirit.base_name}</div>
              <div class="hero-badges">${attrBadges}${eggBadges}</div>
            </div>
            <div style="text-align:center;margin-top:16px;color:var(--muted);font-size:14px">
              ${spirit.description || ''}
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">六维属性</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--muted)">总种族值: ${spirit.race_total || 0}</div>
          </div>
          <div class="card-body">
            <div class="radar-container">
              <svg viewBox="0 0 300 300">
                ${Array.from({length: GRID_LEVELS}, (_, i) => `<polygon points="${gridPoints(i+1)}" fill="none" stroke="#e5e5e5" stroke-width="1" />`).join('')}
                ${statOrder.map((_, i) => `<line x1="${RADAR_CX}" y1="${RADAR_CY}" x2="${axisEnd(i).x}" y2="${axisEnd(i).y}" stroke="#e5e5e5" stroke-width="1" />`).join('')}
                <polygon points="${radarPoints}" fill="rgba(10,207,131,0.2)" stroke="var(--green)" stroke-width="2" />
                ${statOrder.map((key, i) => {
                  const p = polarToXY(i, RADAR_R + 20);
                  return `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="var(--muted)">${statLabels[key].label}</text>`;
                }).join('')}
              </svg>
            </div>
            <div class="stats-grid">
              ${stats.map(s => `<div class="stat-item"><div class="stat-label">${s.label}</div><div class="stat-value" style="color:${s.color}">${s.value}</div></div>`).join('')}
            </div>
          </div>
        </div>
      </div>

      <!-- 技能列表 -->
      <div class="card" style="margin-top:24px">
        <div class="card-header">
          <div class="card-title">技能列表</div>
          <div style="font-size:12px;color:var(--muted)">${sortedSkills.length} 个技能</div>
        </div>
        <div class="card-body">
          ${Object.entries(groupedSkills).map(([type, list]) => {
            const style = SKILL_TYPE_STYLES[type] || SKILL_TYPE_STYLES['状态'];
            return `
              <div style="margin-bottom:16px">
                <div style="font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px">
                  <span style="display:inline-flex;padding:2px 8px;border-radius:4px;font-size:12px;background:${style.bg};color:${style.color}">${style.label}</span>
                  ${type}技能
                </div>
                <div class="skills-list">
                  ${list.map(s => `
                    <div class="skill-item">
                      <div class="skill-icon">
                        ${s.icon_url ? `<img src="${s.icon_url}" alt="${s.name}" onerror="this.parentElement.innerHTML='⚔️'" />` : '⚔️'}
                      </div>
                      <div class="skill-info">
                        <div class="skill-name">${s.name}</div>
                        <div class="skill-meta">
                          ${s.attribute ? `<span>${formatAttr(s.attribute)}</span> · ` : ''}
                          <span>威力: ${s.power || '-'}</span> · 
                          <span>耗能: ${s.cost || '-'}</span>
                        </div>
                        ${s.effect ? `<div class="skill-effect">${s.effect}</div>` : ''}
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <!-- 属性克制 -->
      ${matchupsHtml ? `
      <div class="card" style="margin-top:24px">
        <div class="card-header">
          <div class="card-title">属性克制</div>
        </div>
        <div class="card-body">
          <div class="matchups-grid">${matchupsHtml}</div>
        </div>
      </div>
      ` : ''}
    `;
  }

  // Drawer
  window.toggleDrawer = function(){
    document.getElementById('drawer').classList.toggle('open');
  };

  // 异色切换
  let showShiny = false;
  window.toggleShiny = function(){
    showShiny = !showShiny;
    const img = document.getElementById('heroImg');
    if (img) {
      // 需要重新获取数据来切换图片
      fetchDetail();
    }
  };

  fetchDetail();
})();
</script>
</body>
</html>
