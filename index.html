<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>洛克王国：世界 - 孵蛋查询</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(180deg,#e8f0fe 0%,#f5f0ff 50%,#fff 100%);min-height:100vh;padding:16px;padding-bottom:env(safe-area-inset-bottom,16px)}
        .box{max-width:420px;margin:0 auto}
        .hd{text-align:center;padding:20px 0 16px}
        .hd h1{font-size:22px;color:#1a1a2e}
        .hd .sub{font-size:13px;color:#888;margin-top:4px}
        .card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:12px}
        .row{display:flex;gap:12px;margin-bottom:14px}
        .ipt{flex:1}
        .ipt label{display:block;font-size:12px;color:#888;margin-bottom:6px}
        .ipt input{width:100%;padding:12px;border:1.5px solid #e8e8e8;border-radius:10px;font-size:17px;font-weight:500;background:#fafafa;transition:.2s}
        .ipt input:focus{outline:none;border-color:#667eea;background:#fff}
        .tags{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
        .tag{padding:7px 14px;border-radius:20px;font-size:13px;border:1.5px solid #e8e8e8;background:#fff;color:#666;cursor:pointer;transition:.2s;user-select:none}
        .tag.on{border-color:#667eea;background:#667eea;color:#fff}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:.15s}
        .btn:active{transform:scale(.97)}
        .btn:disabled{opacity:.5}
        .tabs{display:flex;background:#f5f5f5;border-radius:10px;padding:3px;margin-bottom:14px}
        .tb{flex:1;padding:8px 0;text-align:center;border-radius:8px;font-size:13px;color:#888;cursor:pointer;border:none;background:0 0;transition:.2s}
        .tb.on{background:#fff;color:#333;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
        .tb .n{font-weight:700;color:#667eea}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
        .pc{background:#f8f9ff;border-radius:10px;padding:28px 4px 8px;text-align:center;border:1.5px solid transparent;transition:.15s;position:relative;overflow:hidden}
        .pc:active{transform:scale(.96)}
        .ic{width:36px;height:36px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:16px}
        .nm{font-size:11px;font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;max-width:100%;padding:0 2px}
        .lv{font-size:9px;margin-top:2px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .rg{font-size:9px;color:#bbb;margin-top:1px}
.rv{font-size:9px;color:#7c4dff;font-weight:500;margin-top:1px}
.rd{font-size:9px;color:#ff6d00;font-weight:500;margin-top:1px}
        .badge{position:absolute;top:3px;right:3px;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:600;color:#fff;max-width:70px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .empty{text-align:center;padding:40px 0;color:#ccc}
        .empty-i{font-size:48px;margin-bottom:8px}
        .ft{text-align:center;padding:16px 0 8px;font-size:11px;color:#bbb}
        .ft a{color:#999}
        .tip{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:center}
        .tip.on{display:flex}
        .tip-b{background:#fff;border-radius:16px;padding:24px;width:85%;max-width:320px}
        .tip-b h3{font-size:16px;margin-bottom:12px}
        .tip-b p{font-size:13px;color:#666;line-height:1.8}
        .tip-b button{margin-top:16px;width:100%;padding:10px;border:none;background:#667eea;color:#fff;border-radius:8px;font-size:14px}
    </style>
</head>
<body>
<div class="box">
    <div class="hd"><h1>🥚 孵蛋查询</h1><div class="sub">洛克王国：世界</div></div>
    <div class="card">
        <div class="row">
            <div class="ipt"><label>身高 (m)</label><input type="number" id="h" step="0.01" min="0" placeholder="0.24"></div>
            <div class="ipt"><label>体重 (kg)</label><input type="number" id="w" step="0.001" min="0" placeholder="1.600"></div>
        </div>
        <div class="tags" id="eggTags">
            <div class="tag on" data-t="magic">🥚 神奇的蛋</div>
            <div class="tag" data-t="colorful">✨ 炫彩蛋</div>
            <div class="tag" data-t="all">📦 不限类型</div>
        </div>
        <button class="btn" id="btn" onclick="go()">查询</button>
    </div>
    <div class="card" id="rc" style="display:none">
        <div class="tabs">
            <button class="tb on" onclick="stab(this,'all')">全部 <span class="n" id="nA">0</span></button>
            <button class="tb" onclick="stab(this,'normal')">🥚 神奇 <span class="n" id="nN">0</span></button>
            <button class="tb" onclick="stab(this,'special')">✨ 炫彩 <span class="n" id="nS">0</span></button>
        </div>
        <div class="uR" id="uR" style="text-align:center;font-size:10px;color:#7c4dff;margin:4px 0;font-weight:500"></div>
        <div id="ra"></div>
    </div>
    <div class="ft">数据 <a href="https://github.com/jiluoQAQ/RocomUID" target="_blank">RocomUID</a> | <a href="javascript:tipOn()">R值说明</a></div>
</div>
<div class="tip" id="tip" onclick="tipOff()">
<div class="tip-b" onclick="event.stopPropagation()">
    <h3>📊 R值说明</h3>
    <p>
        🎯 <b>R值公式</b> — R = 体重(kg) ÷ 身高(m)<br>
        📏 差值越小表示越接近你的精灵属性，匹配概率越高
    </p>
    <button onclick="tipOff()">我知道了</button>
</div>
</div>
<script>
const API=location.origin;
let R=[],tab='all',eggT='magic',userR=0;
document.querySelectorAll('.tag').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tag').forEach(x=>x.classList.remove('on'));t.classList.add('on');eggT=t.dataset.t});

async function go(){
    const h=+document.getElementById('h').value,w=+document.getElementById('w').value,b=document.getElementById('btn');
    if(!h||!w){document.querySelector('.row').style.animation='none';document.querySelector('.row').offsetHeight;document.querySelector('.row').style.animation='sk .3s';return}
    b.disabled=1;b.textContent='查询中...';
    try{
        let url=`${API}/api/query?height=${h}&weight=${w}`;
        if(eggT==='magic')url+='&precious=0';
        else if(eggT==='colorful')url+='&precious=1';
        const r=await fetch(url);
        const d=await r.json();
        if(d.success){
            R=d.results;
            userR=d.user_r||0;
            document.getElementById('nA').textContent=d.total;
            document.getElementById('nN').textContent=d.normal_count;
            document.getElementById('nS').textContent=d.precious_count;
            document.getElementById('uR').textContent='你的R值: '+userR.toFixed(2);
            document.getElementById('rc').style.display='block';
            render();document.getElementById('rc').scrollIntoView({behavior:'smooth'});
        }
    }catch(e){alert('查询失败')}
    finally{b.disabled=0;b.textContent='查询'}
}

function stab(el,t){tab=t;document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));el.classList.add('on');render()}

function render(){
    let L=R;
    if(tab==='normal')L=R.filter(r=>r.precious_type===0);
    if(tab==='special')L=R.filter(r=>r.precious_type>0);
    const a=document.getElementById('ra');
    if(!L.length){a.innerHTML='<div class="empty"><div class="empty-i">🐣</div>暂无结果</div>';return}
    a.innerHTML='<div class="grid">'+L.map(r=>{
        const bg=r.precious_type>0?`background:linear-gradient(135deg,#fffdf0,#fff8dc);border-color:${r.egg_type_color}40`:'';
        const icBg=r.precious_type>0?`background:linear-gradient(135deg,#fff3cd,#ffe082)`:`background:linear-gradient(135deg,#e8f0fe,#d4e0ff)`;
        const rDiff=r.r_diff!=null?r.r_diff.toFixed(2):'-';
        const imgHtml=r.image?`<img src="${r.image}" style="width:48px;height:48px;object-fit:contain;" onerror="this.outerHTML='${ico(r.name)}'" loading="lazy">`:ico(r.name);
        const link=r.spirit_id?`href="/compendium/${r.spirit_id}"`:'';
        const tag=r.spirit_id?'a':'div';
        return `<${tag} ${link} class="pc" style="${bg};${r.spirit_id?'cursor:pointer;text-decoration:none;color:inherit;':''}">
            <div class="badge" style="background:${r.egg_type_color}">${r.egg_type_icon} ${r.egg_type_name.replace('蛋','')}</div>
            <div class="ic" style="${icBg}">${imgHtml}</div>
            <div class="nm" title="${r.name}">${r.name}</div>
            <div class="rg">${r.height_min.toFixed(2)}-${r.height_max.toFixed(2)}m</div>
            <div class="rv">🎯R值: ${r.r_value?r.r_value.toFixed(2):'-'}</div>
            <div class="rd">📏差值: ${rDiff}</div>
        </${tag}>`}).join('')+'</div>';
}

function ico(n){
    const m={'喵':'🐱','水蓝':'💧','火':'🔥','迪莫':'✨','鸟':'🐦','鸭':'🦆','鼠':'🐭','犬':'🐕','猫':'🐱','虫':'🐛','蝶':'🦋','花':'🌸','草':'🌿','石':'🪨','龙':'🐉','蛇':'🐍','兔':'🐰','羊':'🐑','猪':'🐷','熊':'🐻','狐':'🦊','鱼':'🐟','龟':'🐢','蜂':'🐝','蛛':'🕷️','菇':'🍄','树':'🌳','冰':'❄️','电':'⚡','雪':'🌨️','精灵':'🧚','恶魔':'😈','幽':'👻','幻':'🔮','甲':'🪲','鹰':'🦅','狼':'🐺'};
    for(const[k,v]of Object.entries(m))if(n.includes(k))return v;return'🐾';
}
function tipOn(){document.getElementById('tip').classList.add('on')}
function tipOff(){document.getElementById('tip').classList.remove('on')}
document.addEventListener('keydown',e=>{if(e.key==='Enter')go()});
const s=document.createElement('style');s.textContent='@keyframes sk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}';document.head.appendChild(s);
</script>
</body>
</html>
